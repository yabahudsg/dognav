            "query-input": "required name=search_term_string"

    </script>
    <style>
        /* ═══════════════════════════════════════════
           DESIGN SYSTEM — Glassmorphism Enhanced
           ═══════════════════════════════════════════ */
        :root {
            --text-xs: clamp(0.7rem, 0.65rem + 0.25vw, 0.78rem);
            --text-sm: clamp(0.78rem, 0.73rem + 0.25vw, 0.88rem);
            --text-base: clamp(0.88rem, 0.83rem + 0.25vw, 1rem);
            --text-lg: clamp(1rem, 0.92rem + 0.4vw, 1.2rem);
            --text-xl: clamp(1.15rem, 1rem + 0.6vw, 1.5rem);
            --text-2xl: clamp(1.4rem, 1.15rem + 1.2vw, 2rem);
            --text-3xl: clamp(1.8rem, 1.3rem + 2.5vw, 3rem);
            --space-xs: clamp(0.2rem, 0.15rem + 0.25vw, 0.4rem);
            --space-sm: clamp(0.4rem, 0.3rem + 0.4vw, 0.65rem);
            --space-md: clamp(0.6rem, 0.4rem + 1vw, 1.2rem);
            --space-lg: clamp(1rem, 0.6rem + 2vw, 2.5rem);
            --space-xl: clamp(1.5rem, 0.8rem + 3.5vw, 4rem);
            --r-sm: 8px; --r-md: 12px; --r-lg: 16px; --r-pill: 9999px;
            --ease: cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ─── DARK ─── */
        [data-theme="dark"] {
            --bg-base: #0f0e17;
            --bg-surface: #1a1926;
            --bg-card: rgba(255, 255, 255, 0.04);
            --bg-card-hover: rgba(255, 255, 255, 0.08);
            --bg-nav: rgba(15, 14, 23, 0.75);
            --bg-input: rgba(255, 255, 255, 0.05);
            --text-1: #fffffe;
            --text-2: rgba(255, 255, 255, 0.6);
            --text-3: rgba(255, 255, 255, 0.32);
            --accent: #7f5af0;
            --accent-2: #e16162;
            --accent-3: #2cb67d;
            --accent-soft: rgba(127, 90, 240, 0.12);
            --accent-glow: rgba(127, 90, 240, 0.25);
            --border: rgba(255, 255, 255, 0.07);
            --border-hover: rgba(255, 255, 255, 0.14);
            --orb-1: rgba(102, 126, 234, 0.18);
            --orb-2: rgba(118, 75, 162, 0.14);
            --orb-3: rgba(240, 147, 251, 0.1);
            --shadow-card: 0 2px 12px rgba(0,0,0,0.2);
            --shadow-hover: 0 8px 32px rgba(0,0,0,0.35);
        }

        /* ─── LIGHT ─── */
        [data-theme="light"] {
            --bg-base: #f5f5f7;
            --bg-surface: #ffffff;
            --bg-card: rgba(255, 255, 255, 0.85);
            --bg-card-hover: rgba(255, 255, 255, 0.95);
            --bg-nav: rgba(245, 245, 247, 0.78);
            --bg-input: rgba(0, 0, 0, 0.04);
            --text-1: #1d1d1f;
            --text-2: rgba(29, 29, 31, 0.72);
            --text-3: rgba(29, 29, 31, 0.52);
            --accent: #6c47d6;
            --accent-2: #d64547;
            --accent-3: #1a9d6a;
            --accent-soft: rgba(108, 71, 214, 0.08);
            --accent-glow: rgba(108, 71, 214, 0.18);
            --border: rgba(0, 0, 0, 0.06);
            --border-hover: rgba(0, 0, 0, 0.12);
            --orb-1: rgba(102, 126, 234, 0.12);
            --orb-2: rgba(118, 75, 162, 0.08);
            --orb-3: rgba(240, 147, 251, 0.06);
            --shadow-card: 0 1px 8px rgba(0,0,0,0.04);
            --shadow-hover: 0 6px 24px rgba(0,0,0,0.08);
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }
        .notransition, .notransition * { transition: none !important; }
        body {
            font-family: 'Sora', 'Noto Sans SC', system-ui, sans-serif;
            background: var(--bg-base);
            color: var(--text-1);
            min-height: 100dvh;
            overflow-x: hidden;
            line-height: 1.55;
            transition: background 0.3s var(--ease), color 0.3s var(--ease);
        }

        /* ═══════════════════════════════════════════
           ANIMATED BACKGROUND ORBS
           ═══════════════════════════════════════════ */
        .bg-orbs { position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; }
        .orb {
            position: absolute; border-radius: 50%;
            filter: blur(80px);
            will-change: transform;
        }
        .orb-1 { width: 45vw; height: 45vw; background: var(--orb-1); top: -10%; left: -8%; animation: orbFloat1 22s ease-in-out infinite; }
        .orb-2 { width: 38vw; height: 38vw; background: var(--orb-2); top: 40%; right: -8%; animation: orbFloat2 26s ease-in-out infinite; }
        .orb-3 { width: 30vw; height: 30vw; background: var(--orb-3); bottom: -5%; left: 25%; animation: orbFloat3 20s ease-in-out infinite; }

        @keyframes orbFloat1 { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(4vw,-3vw) scale(1.08)} }
        @keyframes orbFloat2 { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(-3vw,4vw) scale(0.94)} }
        @keyframes orbFloat3 { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(3vw,-2vw) scale(1.06)} }

        /* ═══════════════════════════════════════════
           NAVBAR
           ═══════════════════════════════════════════ */
        .navbar {
            position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
            padding: 10px var(--space-lg);
            display: flex; align-items: center; justify-content: space-between;
            background: var(--bg-nav);
            backdrop-filter: blur(24px) saturate(1.4);
            -webkit-backdrop-filter: blur(24px) saturate(1.4);
            border-bottom: 1px solid var(--border);
            transition: background 0.5s var(--ease), border-color 0.5s var(--ease);
        }

        .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
        .logo-ico {
            width: 32px; height: 32px; border-radius: 9px;
            background: linear-gradient(135deg, var(--accent), #a78bfa);
            display: flex; align-items: center; justify-content: center;
            font-size: 16px;
            box-shadow: 0 2px 10px var(--accent-glow);
        }
        .logo-text {
            font-size: var(--text-lg); font-weight: 700;
            color: var(--text-1); letter-spacing: -0.3px;
            transition: color 0.5s var(--ease);
        }
        .logo-text span { color: var(--accent); }

        .nav-right { display: flex; align-items: center; gap: 8px; }
        .nav-links { display: flex; gap: 2px; list-style: none; }
        .nav-links a {
            color: var(--text-2); text-decoration: none;
            font-size: var(--text-sm); font-weight: 500;
            padding: 6px 14px; border-radius: var(--r-pill);
            transition: all 0.2s var(--ease);
        }
        .nav-links a:hover { color: var(--text-1); background: var(--bg-card); }
        .nav-links a.active { color: var(--accent); background: var(--accent-soft); }

        /* Nav dropdown — custom pages */
        .nav-dropdown { position: relative; }
        .nav-dropdown > a::after { content: ' ▾'; font-size: 10px; }
        .nav-dropdown-menu {
            position: absolute; top: 100%; right: 0;
            background: var(--bg-card); backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border); border-radius: var(--r-md);
            padding: 4px; min-width: 140px; display: none;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            z-index: 1001;
        }
        .nav-dropdown:hover .nav-dropdown-menu { display: block; }
        .nav-dropdown-menu a {
            display: block; padding: 8px 14px; border-radius: var(--r-sm);
            color: var(--text-2); text-decoration: none; font-size: var(--text-sm);
            white-space: nowrap;
        }
        .nav-dropdown-menu a:hover { color: var(--text-1); background: var(--accent-soft); }

        /* Theme toggle */
        .theme-btn {
            width: 34px; height: 34px;
            border: 1px solid var(--border); border-radius: var(--r-sm);
            background: var(--bg-card); color: var(--text-2);
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 15px; position: relative; overflow: hidden;
            transition: all 0.2s var(--ease);
        }
        .theme-btn:hover { border-color: var(--border-hover); color: var(--accent); }
        .theme-btn i { position: absolute; transition: transform 0.35s var(--ease), opacity 0.25s; }
        [data-theme="dark"] .theme-btn .i-sun { transform: translateY(20px); opacity: 0; }
        [data-theme="dark"] .theme-btn .i-moon { transform: translateY(0); opacity: 1; }
        [data-theme="light"] .theme-btn .i-sun { transform: translateY(0); opacity: 1; }
        [data-theme="light"] .theme-btn .i-moon { transform: translateY(-20px); opacity: 0; }

        .mob-btn {
            display: none; background: none;
            border: 1px solid var(--border); border-radius: var(--r-sm);
            padding: 6px; color: var(--text-2); cursor: pointer;
        }

        /* ═══════════════════════════════════════════
           HERO
           ═══════════════════════════════════════════ */
        .hero {
            position: relative; z-index: 1;
            padding: calc(70px + var(--space-xl)) var(--space-lg) var(--space-md);
            text-align: center; max-width: 680px; margin: 0 auto;
        }

        .hero-tag {
            display: inline-flex; align-items: center; gap: 7px;
            padding: 4px 14px; margin-bottom: var(--space-md);
            background: var(--accent-soft); border: 1px solid var(--border);
            border-radius: var(--r-pill);
            font-size: var(--text-xs); color: var(--accent);
            font-weight: 600; letter-spacing: 1px;
        }
        .hero-tag .dot {
            width: 5px; height: 5px; border-radius: 50%;
            background: var(--accent); animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.8)} }

        .hero-title {
            font-size: var(--text-3xl); font-weight: 700;
            line-height: 1.15; margin-bottom: 8px;
            letter-spacing: -0.5px;
            transition: color 0.2s var(--ease);
        }
        .hero-title .grad {
            background: linear-gradient(135deg, var(--accent), #a78bfa, var(--accent-2));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; background-size: 200% 200%;
            animation: gradShift 6s ease-in-out infinite;
        }
        @keyframes gradShift { 0%,100%{background-position:0% 50%} 50%{background-position:100% 50%} }

        .hero-sub {
            font-size: var(--text-base); color: var(--text-2);
            margin-bottom: var(--space-sm); font-weight: 300;
            transition: color 0.2s var(--ease);
        }

        .hitokoto {
            font-size: var(--text-xs); color: var(--text-3);
            font-style: italic; margin-bottom: var(--space-md);
        }
        .hitokoto cite { color: var(--accent); font-style: normal; margin-left: 6px; }

        /* Search */
        .search-box { position: relative; max-width: 540px; margin: 0 auto var(--space-sm); }
        .search-input {
            width: 100%; padding: 13px 48px 13px 18px;
            background: var(--bg-input); border: 1px solid var(--border);
            border-radius: var(--r-lg); color: var(--text-1);
            font-size: var(--text-base); font-family: inherit; outline: none;
            backdrop-filter: blur(12px);
            transition: all 0.3s var(--ease);
        }
        .search-input::placeholder { color: var(--text-3); }
        .search-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
            background: var(--bg-card-hover);
        }
        .search-go {
            position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
            width: 36px; height: 36px;
            background: var(--accent); border: none; border-radius: 10px;
            color: #fff; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.25s var(--ease);
        }
        .search-go:hover { transform: translateY(-50%) scale(1.06); box-shadow: 0 4px 14px var(--accent-glow); }

        .eng-row { display: flex; justify-content: center; gap: 5px; flex-wrap: wrap; margin-bottom: var(--space-lg); }
        .eng-btn {
            padding: 4px 12px; background: transparent;
            border: 1px solid var(--border); border-radius: var(--r-pill);
            color: var(--text-3); font-size: var(--text-xs);
            font-family: inherit; font-weight: 500; cursor: pointer;
            transition: all 0.2s var(--ease);
        }
        .eng-btn:hover { border-color: var(--border-hover); color: var(--text-2); }
        .eng-btn.on { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }

        /* ═══════════════════════════════════════════
           CATEGORY BAR
           ═══════════════════════════════════════════ */
        .cat-bar {
            position: relative; z-index: 1;
            max-width: 1400px; margin: 0 auto var(--space-md);
            padding: 0 var(--space-lg);
            display: flex; gap: 6px; overflow-x: auto;
            scrollbar-width: none;
        }
        .cat-bar::-webkit-scrollbar { display: none; }
        .cat-pill {
            flex-shrink: 0; padding: 6px 16px;
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: var(--r-pill); color: var(--text-2);
            font-size: var(--text-sm); font-weight: 500; cursor: pointer;
            transition: all 0.25s var(--ease); white-space: nowrap;
            backdrop-filter: blur(8px);
        }
        .cat-pill:hover { background: var(--bg-card-hover); border-color: var(--border-hover); }
        .cat-pill.on { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }

        /* ═══════════════════════════════════════════
           CARDS — Compact Glass
           ═══════════════════════════════════════════ */
        .cards-area {
            position: relative; z-index: 1;
            max-width: 1400px; margin: 0 auto;
            padding: 0 var(--space-lg) var(--space-xl);
        }

        .sec-head {
            display: flex; align-items: center; gap: 10px;
            margin-bottom: var(--space-sm);
        }
        .sec-ico {
            width: 28px; height: 28px; border-radius: 7px;
            display: flex; align-items: center; justify-content: center;
            font-size: 13px; background: var(--accent-soft);
            color: var(--accent);
        }
        .sec-title {
            font-size: var(--text-base); font-weight: 600;
            color: var(--text-1); transition: color 0.2s var(--ease);
        }
        .sec-line { flex: 1; height: 1px; background: var(--border); }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(min(210px, 100%), 1fr));
            gap: 8px;
            margin-bottom: var(--space-lg);
        }

        .card {
            position: relative;
            padding: 12px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--r-md);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            text-decoration: none; display: block; cursor: pointer;
            transition: transform 0.3s var(--ease), box-shadow 0.3s var(--ease);
            overflow: hidden;
        }

        .card::after {
            content: '';
            position: absolute; inset: 0;
            border-radius: inherit;
            background: radial-gradient(circle at var(--mx, 50%) var(--my, 50%), var(--accent-glow), transparent 60%);
            opacity: 0; transition: opacity 0.3s;
            pointer-events: none;
        }

        .card:hover {
            background: var(--bg-card-hover);
            border-color: var(--border-hover);
            transform: translateY(-2px);
            box-shadow: var(--shadow-hover);
        }
        .card:hover::after { opacity: 1; }

        .card-row { display: flex; align-items: center; gap: 9px; }
        .card-fav {
            width: 28px; height: 28px; border-radius: 7px;
            background: var(--bg-input); border: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            font-size: 13px; flex-shrink: 0;
            transition: background 0.2s var(--ease), border-color 0.2s var(--ease);
        }
        .card-name {
            font-size: var(--text-sm); font-weight: 600;
            color: var(--text-1); line-height: 1.3;
            transition: color 0.2s var(--ease);
        }
        .card-desc {
            font-size: var(--text-xs); color: var(--text-3);
            margin-top: 5px; line-height: 1.4;
            display: -webkit-box; -webkit-line-clamp: 1;
            -webkit-box-orient: vertical; overflow: hidden;
            transition: color 0.2s var(--ease);
        }

        /* ═══════════════════════════════════════════
           FOOTER
           ═══════════════════════════════════════════ */
        .footer {
            position: relative; z-index: 1;
            text-align: center; padding: var(--space-lg);
            border-top: 1px solid var(--border);
            color: var(--text-3); font-size: var(--text-xs);
            transition: border-color 0.5s var(--ease);
        }
        .footer a { color: var(--accent); text-decoration: none; }

        /* Back to top */
        .btt {
            position: fixed; bottom: 24px; right: 24px; z-index: 100;
            width: 38px; height: 38px;
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: var(--r-md); backdrop-filter: blur(12px);
            color: var(--text-2); cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; transform: translateY(10px);
            transition: all 0.3s var(--ease);
            pointer-events: none;
        }
        .btt.show { opacity: 1; transform: translateY(0); pointer-events: auto; }
        .btt:hover { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }

        /* ═══════════════════════════════════════════
           REVEAL
           ═══════════════════════════════════════════ */
        .rv { opacity: 0; transform: translateY(10px); transition: opacity 0.4s var(--ease), transform 0.4s var(--ease); }
        .rv.vis { opacity: 1; transform: translateY(0); }

        /* ══════════════════════════════════════════
           WEATHER WIDGET
           ═══════════════════════════════════════════ */
        .weather-widget {
            position: fixed; top: 100px; right: 48px; z-index: 99;
            padding: 8px 0;
            transition: all 0.3s var(--ease);
            opacity: 0; transform: translateX(20px);
            pointer-events: none;
        }
        .weather-widget.show { opacity: 1; transform: translateX(0); pointer-events: auto; }

        .weather-city {
            font-size: var(--text-base); font-weight: 600;
            color: var(--text-1); margin-bottom: 4px;
            display: flex; align-items: center; gap: 6px;
        }
        .weather-main {
            display: flex; align-items: center; gap: 10px;
            margin-bottom: 6px;
        }
        .weather-icon { font-size: 36px; line-height: 1; }
        .weather-temp {
            font-size: 2.2rem; font-weight: 700;
            color: var(--text-1); line-height: 1;
        }
        .weather-desc {
            font-size: var(--text-sm); color: var(--text-2);
            margin-bottom: 6px;
        }
        .weather-details {
            display: flex; gap: 14px;
            font-size: var(--text-sm); color: var(--text-3);
        }
        .weather-details span { display: flex; align-items: center; gap: 4px; }
        .weather-loading {
            font-size: var(--text-sm); color: var(--text-3);
            text-align: center; padding: 8px 0;
        }

        /* ═══════════════════════════════════════════
           RESPONSIVE
           ═══════════════════════════════════════════ */
        @media (max-width: 768px) {
            .nav-links { display: none; }
            .mob-btn { display: flex; }
            .nav-links.open {
                display: flex; flex-direction: column;
                position: absolute; top: 100%; left: 0; right: 0;
                background: var(--bg-nav); backdrop-filter: blur(20px);
                padding: var(--space-md); border-bottom: 1px solid var(--border);
            }
            .hero, .cards-area, .cat-bar { padding-left: var(--space-md); padding-right: var(--space-md); }
            .weather-widget { display: none; }
        }
        @media (max-width: 480px) {
            .card-grid { grid-template-columns: repeat(2, 1fr); gap: 6px; }
            .card { padding: 10px; }
            .card-fav { width: 24px; height: 24px; font-size: 11px; }
            .card-desc { display: none; }
        }

        /* LOADER */
        .loader {
            position: fixed; inset: 0; z-index: 9999;
            background: var(--bg-base);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            transition: opacity 0.4s, visibility 0.4s;
        }
        .loader.hide { opacity: 0; visibility: hidden; }
        .loader-spinner {
            width: 32px; height: 32px;
            border: 2px solid var(--border);

// ═══════════════════════════════════════════
// WEATHER — QWeather API
// ═══════════════════════════════════════════
const WEATHER_KEY = 'd7ebb8f4da72492f9ac290d366e8dab4';

// Weather icon code to emoji mapping
const WEATHER_EMOJI = {
    '100': '☀️', '101': '⛅', '102': '⛅', '103': '🌤️', '104': '☁️',
    '150': '🌙', '151': '🌙', '153': '',
    '300': '️', '301': '️', '302': '⛈️', '303': '⛈️', '304': '⛈️',
    '305': '🌧️', '306': '🌧️', '307': '🌧️', '308': '🌧️', '309': '️',
    '310': '🌧️', '311': '🌧️', '312': '️', '313': '️', '314': '️', '315': '🌧️',
    '316': '🌧️', '317': '🌧️', '318': '🌧️', '399': '🌧️',
    '400': '🌨️', '401': '🌨️', '402': '️', '403': '❄️', '404': '️',
    '405': '️', '406': '🌨️', '407': '🌨️', '408': '🌨️', '409': '🌨️',
    '410': '❄️', '456': '🌨️', '457': '🌨️', '499': '❄️',
    '500': '🌫️', '501': '🌫️', '502': '🌫️', '503': '️', '504': '️',
    '507': '️', '508': '️', '509': '🌫️', '510': '🌫️', '514': '🌫️',
    '515': '🌫️', '900': '🌡️', '901': '🌡️', '999': '🌡️',
};

(async function initWeather() {
    const widget = document.getElementById('weatherWidget');
    const loading = document.getElementById('weatherLoading');
    const content = document.getElementById('weatherContent');

    try {
        // Step 1: Get user's city from IP geolocation
        let cityName = '';

        // Try multiple IP geolocation services
        const ipSources = [
            { url: 'https://ipinfo.io/json', parse: d => d.city },
            { url: 'http://ip-api.com/json/?lang=zh-CN', parse: d => d.city },
            { url: 'https://whois.pconline.com.cn/ipJson.jsp?json=true', parse: d => d.city },
        ];

        for (const src of ipSources) {
            try {
                const res = await fetch(src.url, { signal: AbortSignal.timeout(4000) });
                const data = await res.json();
                cityName = src.parse(data);
                if (cityName) break;
            } catch (e) { /* try next source */ }
        }

        if (!cityName) throw new Error('All IP geolocation sources failed');

        // Step 2: Look up QWeather location ID by city name
        const geoRes = await fetch(`https://geoapi.qweather.com/v2/city/lookup?location=${encodeURIComponent(cityName)}&key=${WEATHER_KEY}`);
        const geoData = await geoRes.json();

        if (geoData.code !== '200' || !geoData.location || geoData.location.length === 0) {
            throw new Error('Location lookup failed for: ' + cityName);
        }

        const locationId = geoData.location[0].id;
        const displayName = geoData.location[0].name;

        // Step 3: Get current weather
        const weatherRes = await fetch(`https://devapi.qweather.com/v7/weather/now?location=${locationId}&key=${WEATHER_KEY}`);
        const weatherData = await weatherRes.json();

        if (weatherData.code !== '200') {
            throw new Error('Weather fetch failed');
        }

        const now = weatherData.now;
        const emoji = WEATHER_EMOJI[now.icon] || '🌡️';

        // Populate widget
        document.getElementById('weatherCity').textContent = displayName;
        document.getElementById('weatherIcon').textContent = emoji;
        document.getElementById('weatherTemp').textContent = now.temp + '°C';
        document.getElementById('weatherDesc').textContent = now.text;
        document.getElementById('weatherHumidity').innerHTML = '💧 ' + now.humidity + '%';
        document.getElementById('weatherWind').innerHTML = '💨 ' + now.windSpeed + 'm/s';

        // Show widget
        loading.style.display = 'none';
        content.style.display = 'block';
        widget.classList.add('show');

    } catch (err) {
        console.warn('Weather widget error:', err);
        loading.textContent = '天气加载失败';
        setTimeout(() => { widget.style.display = 'none'; }, 3000);
    }
})();

// ═══════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════
function render(cat = 'all') {
    const a = document.getElementById('cardsArea');
    const f = cat === 'all' ? S : S.filter(s => (s.c || s.category) === cat);
    const g = {};
    f.forEach(s => { const k = s.c || s.category; if (!g[k]) g[k] = []; g[k].push(s); });
    let h = '';
    for (const [k, items] of Object.entries(g)) {
        const c = C[k] || { i: '📁', l: k };
        h += `<div class="sec-head rv"><div class="sec-ico">${c.i}</div><div class="sec-title">${c.l}</div><div class="sec-line"></div></div>
        <div class="card-grid">${items.map(s => {
            const name = s.n || s.name;
            const url = s.u || s.url;
            const desc = s.d || s.description || '';
            const icon = s.i || s.icon || '🌐';
            const iconHtml = icon.startsWith('http') ? `<img src="${icon}" style="width:20px;height:20px;border-radius:4px;object-fit:cover" onerror="this.outerHTML='🌐'">` : icon;
            const id = s.id || '';
            const nf = s.nofollow ? 'noopener nofollow' : 'noopener';
            return `<a href="${url}" target="_blank" rel="${nf}" class="card rv" title="${name} — ${desc}" data-id="${id}" onclick="trackClick(event,'${id}','${url.replace(/'/g, "\\'")}')">
                <div class="card-row"><div class="card-fav">${iconHtml}</div><div class="card-name">${name}</div></div>
                <div class="card-desc">${desc}</div>
            </a>`;
        }).join('')}</div>`;
    }
    a.innerHTML = h;
    initReveal();
    initMouseGlow();
}

// ═══════════════════════════════════════════
// MOUSE GLOW ON CARDS
// ═══════════════════════════════════════════
function initMouseGlow() {
    document.querySelectorAll('.card').forEach(c => {
        c.addEventListener('mousemove', e => {
            const r = c.getBoundingClientRect();
            c.style.setProperty('--mx', ((e.clientX - r.left) / r.width * 100) + '%');
            c.style.setProperty('--my', ((e.clientY - r.top) / r.height * 100) + '%');
        });
    });
}

// ═══════════════════════════════════════════
// CMS INIT — fetch data from backend API
// ═══════════════════════════════════════════
(async function initCMS() {
    try {
        // Fetch sites from API
        const sitesRes = await fetch('/api/sites');
        if (sitesRes.ok) {
            const apiSites = await sitesRes.json();
            if (apiSites.length > 0) {
                // Only use active sites
                S.length = 0;
                apiSites.filter(s => s.status === 'active').forEach(s => S.push(s));
            }
        }
    } catch (err) {
        console.warn('API sites fetch failed, using fallback data');
    }

    try {
        // Fetch categories from API
        const catsRes = await fetch('/api/categories');
        if (catsRes.ok) {
            const apiCats = await catsRes.json();
            if (apiCats.length > 0) {
                // Rebuild C object
                Object.keys(C).forEach(k => delete C[k]);
                apiCats.filter(c => c.is_active).forEach(c => {
                    C[c.id] = { i: c.icon || '📁', l: c.name };
                });

                // Rebuild category bar
                const bar = document.getElementById('catBar');
                bar.innerHTML = '<button class="cat-pill on" data-cat="all">🔥 全部</button>' +
                    apiCats.filter(c => c.is_active).map(c =>
                        `<button class="cat-pill" data-cat="${c.id}">${c.icon || '📁'} ${c.name}</button>`
                    ).join('');
            }
        }
    } catch (err) {
        console.warn('API categories fetch failed, using fallback data');
    }

    try {
        // Fetch settings for site icon
        const settingsRes = await fetch('/api/settings');
        if (settingsRes.ok) {
            const settings = await settingsRes.json();
            if (settings.site_icon) {
                let link = document.querySelector('link[rel="icon"]');
                if (!link) { link = document.createElement('link'); link.rel = 'icon'; document.head.appendChild(link); }
                link.href = settings.site_icon;
            }
        }
    } catch (err) {
        // Settings stay as-is
    }

    try {
        // Fetch custom pages for navbar "更多" dropdown
        const pagesRes = await fetch('/api/pages');
        if (pagesRes.ok) {
            const pages = await pagesRes.json();
            const customPages = pages.filter(p => !['about','links','contribute'].includes(p.id));
            if (customPages.length > 0) {
                const dropdown = document.getElementById('moreDropdown');
                const menu = document.getElementById('moreDropdownMenu');
                menu.innerHTML = customPages.map(p =>
                    `<a href="/page.html?slug=${p.id}">${p.title || p.id}</a>`
                ).join('');
                dropdown.style.display = '';
            }
        }
    } catch (err) {
        // Pages dropdown stays hidden
    }

    // Render with loaded data
    render();
})();
