<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>友链 - DogNav</title>
    <link rel="icon" href="/ico.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --text-xs: clamp(0.7rem, 0.65rem + 0.25vw, 0.78rem);
            --text-sm: clamp(0.78rem, 0.73rem + 0.25vw, 0.88rem);
            --text-base: clamp(0.88rem, 0.83rem + 0.25vw, 1rem);
            --text-lg: clamp(1rem, 0.92rem + 0.4vw, 1.2rem);
            --text-xl: clamp(1.15rem, 1rem + 0.6vw, 1.5rem);
            --text-2xl: clamp(1.4rem, 1.15rem + 1.2vw, 2rem);
            --text-3xl: clamp(1.8rem, 1.3rem + 2.5vw, 3rem);
            --space-xs: clamp(0.2rem, 0.15rem + 0.25vw, 0.4rem);
            --space-sm: clamp(0.4rem, 0.3rem + 0.4vw, 0.65rem);
            --space-md: clamp(0.6rem, 0.4rem + 1vw, 1.2rem);
            --space-lg: clamp(1rem, 0.6rem + 2vw, 2.5rem);
            --space-xl: clamp(1.5rem, 0.8rem + 3.5vw, 4rem);
            --r-sm: 8px; --r-md: 12px; --r-lg: 16px; --r-pill: 9999px;
            --ease: cubic-bezier(0.4, 0, 0.2, 1);
        }
        [data-theme="dark"] {
            --bg-base: #0f0e17; --bg-surface: #1a1926;
            --bg-card: rgba(255,255,255,0.04); --bg-card-hover: rgba(255,255,255,0.08);
            --bg-nav: rgba(15,14,23,0.75); --bg-input: rgba(255,255,255,0.05);
            --text-1: #fffffe; --text-2: rgba(255,255,255,0.6); --text-3: rgba(255,255,255,0.32);
            --accent: #7f5af0; --accent-2: #e16162; --accent-3: #2cb67d;
            --accent-soft: rgba(127,90,240,0.12); --accent-glow: rgba(127,90,240,0.25);
            --border: rgba(255,255,255,0.07); --border-hover: rgba(255,255,255,0.14);
            --orb-1: rgba(102,126,234,0.18); --orb-2: rgba(118,75,162,0.14); --orb-3: rgba(240,147,251,0.1);
            --shadow-card: 0 2px 12px rgba(0,0,0,0.2); --shadow-hover: 0 8px 32px rgba(0,0,0,0.35);
        }
        [data-theme="light"] {
            --bg-base: #f5f5f7; --bg-surface: #ffffff;
            --bg-card: rgba(255,255,255,0.85); --bg-card-hover: rgba(255,255,255,0.95);
            --bg-nav: rgba(245,245,247,0.78); --bg-input: rgba(0,0,0,0.04);
            --text-1: #1d1d1f; --text-2: rgba(29,29,31,0.72); --text-3: rgba(29,29,31,0.52);
            --accent: #6c47d6; --accent-2: #d64547; --accent-3: #1a9d6a;
            --accent-soft: rgba(108,71,214,0.08); --accent-glow: rgba(108,71,214,0.18);
            --border: rgba(0,0,0,0.06); --border-hover: rgba(0,0,0,0.12);
            --orb-1: rgba(102,126,234,0.12); --orb-2: rgba(118,75,162,0.08); --orb-3: rgba(240,147,251,0.06);
            --shadow-card: 0 1px 8px rgba(0,0,0,0.04); --shadow-hover: 0 6px 24px rgba(0,0,0,0.08);
        }
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }
        body {
            font-family: 'Sora', 'Noto Sans SC', system-ui, sans-serif;
            background: var(--bg-base); color: var(--text-1);
            min-height: 100dvh; overflow-x: hidden; line-height: 1.55;
            transition: background 0.5s var(--ease), color 0.5s var(--ease);
        }
        .bg-orbs { position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; }
        .orb { position: absolute; border-radius: 50%; filter: blur(80px); will-change: transform; }
        .orb-1 { width: 420px; height: 420px; background: var(--orb-1); top: -8%; left: -5%; animation: f1 22s ease-in-out infinite; }
        .orb-2 { width: 350px; height: 350px; background: var(--orb-2); top: 40%; right: -8%; animation: f2 28s ease-in-out infinite; }
        .orb-3 { width: 300px; height: 300px; background: var(--orb-3); bottom: -5%; left: 30%; animation: f3 25s ease-in-out infinite; }
        @keyframes f1 { 0%,100%{ transform: translate(0,0); } 50%{ transform: translate(60px,40px); } }
        @keyframes f2 { 0%,100%{ transform: translate(0,0); } 50%{ transform: translate(-50px,-60px); } }
        @keyframes f3 { 0%,100%{ transform: translate(0,0); } 50%{ transform: translate(40px,-30px); } }
        .navbar {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            display: flex; align-items: center; justify-content: space-between;
            padding: var(--space-md) var(--space-lg);
            background: var(--bg-nav); backdrop-filter: blur(20px) saturate(1.4);
            border-bottom: 1px solid var(--border); transition: background 0.5s var(--ease);
        }
        .logo { display: flex; align-items: center; gap: var(--space-sm); text-decoration: none; color: var(--text-1); }
        .logo-ico { font-size: 1.5rem; }
        .logo-text { font-size: var(--text-lg); font-weight: 700; letter-spacing: -0.02em; }
        .logo-text span { color: var(--accent); }
        .nav-right { display: flex; align-items: center; gap: var(--space-md); }
        .nav-links { display: flex; list-style: none; gap: var(--space-xs); }
        .nav-links a {
            text-decoration: none; color: var(--text-2); font-size: var(--text-sm); font-weight: 500;
            padding: var(--space-xs) var(--space-md); border-radius: var(--r-pill);
            transition: all 0.3s var(--ease);
        }
        .nav-links a:hover, .nav-links a.active { color: var(--text-1); background: var(--accent-soft); }
        .theme-btn {
            background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--r-pill);
            width: 36px; height: 36px; cursor: pointer; display: flex; align-items: center;
            justify-content: center; overflow: hidden; transition: all 0.3s var(--ease);
        }
        .theme-btn:hover { border-color: var(--accent); background: var(--accent-soft); }
        .theme-btn i { font-style: normal; font-size: 1rem; transition: transform 0.4s var(--ease); }
        [data-theme="dark"] .i-moon { display: none; }
        [data-theme="light"] .i-sun { display: none; }
        .mob-btn {
            display: none; background: var(--bg-card); border: 1px solid var(--border);
            border-radius: var(--r-sm); width: 36px; height: 36px; cursor: pointer;
            align-items: center; justify-content: center; color: var(--text-1);
        }
        @media (max-width: 768px) {
            .nav-links {
                display: none; flex-direction: column; position: absolute;
                top: 100%; left: 0; right: 0; background: var(--bg-nav);
                backdrop-filter: blur(20px); padding: var(--space-md);
                border-bottom: 1px solid var(--border);
            }
            .nav-links.open { display: flex; }
            .mob-btn { display: flex; }
        }
        .page-wrap {
            position: relative; z-index: 1;
            max-width: 1100px; margin: 0 auto;
            padding: calc(70px + var(--space-xl)) var(--space-lg) var(--space-xl);
        }
        .page-header { text-align: center; margin-bottom: var(--space-xl); }
        .page-header h1 { font-size: var(--text-3xl); font-weight: 700; letter-spacing: -0.03em; margin-bottom: var(--space-sm); }
        .page-header h1 .grad {
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .page-header p { color: var(--text-2); font-size: var(--text-base); max-width: 500px; margin: 0 auto; }
        .sec-title {
            font-size: var(--text-lg); font-weight: 600; margin-bottom: var(--space-md);
            padding-bottom: var(--space-sm); border-bottom: 1px solid var(--border);
            display: flex; align-items: center; gap: var(--space-sm);
        }
        .sec-title .ico { font-size: 1.2rem; }
        .links-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(min(280px, 100%), 1fr));
            gap: var(--space-md);
        }
        .link-card {
            display: flex; align-items: center; gap: var(--space-md);
            padding: var(--space-md) var(--space-lg);
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: var(--r-lg); text-decoration: none; color: var(--text-1);
            transition: all 0.35s var(--ease); backdrop-filter: blur(12px);
        }
        .link-card:hover {
            background: var(--bg-card-hover); border-color: var(--border-hover);
            box-shadow: var(--shadow-hover); transform: translateY(-2px);
        }
        .link-avatar {
            width: 48px; height: 48px; border-radius: var(--r-md);
            background: var(--accent-soft); display: flex; align-items: center;
            justify-content: center; font-size: 1.4rem; flex-shrink: 0;
        }
        .link-info { flex: 1; min-width: 0; }
        .link-name { font-size: var(--text-base); font-weight: 600; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .link-desc { font-size: var(--text-xs); color: var(--text-3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .link-badge {
            font-size: var(--text-xs); padding: 2px 8px;
            background: var(--accent-soft); color: var(--accent);
            border-radius: var(--r-pill); font-weight: 500; flex-shrink: 0;
        }
        .about-card {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: var(--r-lg); padding: var(--space-lg);
            backdrop-filter: blur(12px); transition: all 0.35s var(--ease);
            color: var(--text-2); font-size: var(--text-base); line-height: 1.8;
        }
        .about-card:hover { background: var(--bg-card-hover); border-color: var(--border-hover); }
        .spacer { height: var(--space-lg); }
        .footer {
            position: relative; z-index: 1; text-align: center; padding: var(--space-lg);
            color: var(--text-3); font-size: var(--text-sm);
            border-top: 1px solid var(--border); margin-top: var(--space-xl);
        }
        .footer a { color: var(--accent); text-decoration: none; }
        .footer a:hover { text-decoration: underline; }
        .rv { opacity: 0; transform: translateY(16px); transition: opacity 0.5s var(--ease), transform 0.5s var(--ease); }
        .rv.vis { opacity: 1; transform: none; }
    </style>
</head>
<body>
<div class="bg-orbs"><div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div></div>

<nav class="navbar">
    <a href="index.html" class="logo"><div class="logo-ico">🐕</div><div class="logo-text">Dog<span>Nav</span></div></a>
    <div class="nav-right">
        <ul class="nav-links" id="navLinks">
            <li><a href="index.html">首页</a></li>
            <li><a href="links.html" class="active">友链</a></li>
            <li><a href="about.html">关于</a></li>
            <li><a href="contribute.html">提交</a></li>
        </ul>
        <button class="theme-btn" id="themeBtn" aria-label="切换主题"><i class="i-sun">☀️</i><i class="i-moon">🌙</i></button>
        <button class="mob-btn" id="mobBtn" aria-label="菜单"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg></button>
    </div>
</nav>

<div class="page-wrap">
    <div class="page-header rv">
        <h1>友情 <span class="grad">链接</span></h1>
        <p>优秀的朋友们，值得一再访问</p>
    </div>

    <div id="linksPageContent"></div>

    <div class="sec-title rv"><span class="ico">🔗</span> 友情链接</div>
    <div class="links-grid" id="friendsGrid">
        <!-- Dynamic content from CMS, fallback below -->
    </div>
</div>

<footer class="footer"><p>DogNav &copy; 2026 — Design by <a href="https://www.cangdog.com" target="_blank">CangDog</a> · <a href="https://github.com/BYGD" target="_blank">GitHub</a></p></footer>

<script>
const H = document.documentElement;
const savedTheme = localStorage.getItem('dognav-theme');
if (savedTheme) H.setAttribute('data-theme', savedTheme);

document.getElementById('themeBtn').addEventListener('click', () => {
    const next = H.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    H.setAttribute('data-theme', next);
    localStorage.setItem('dognav-theme', next);
});
document.getElementById('mobBtn').addEventListener('click', () => document.getElementById('navLinks').classList.toggle('open'));
const obs = new IntersectionObserver(entries => {
    entries.forEach((e, i) => { if (e.isIntersecting) { setTimeout(() => e.target.classList.add('vis'), i * 40); obs.unobserve(e.target); } });
}, { threshold: 0.1 });
function revealEls(els) { setTimeout(() => { els.forEach(el => { const r = el.getBoundingClientRect(); if (r.top < window.innerHeight && r.bottom > 0) { el.classList.add('vis'); } else { obs.observe(el); } }); }, 50); }
revealEls(document.querySelectorAll('.rv'));

// Fallback friend links (used when CMS is unavailable)
const fallbackFriends = [
    { name: '阮一峰的网络日志', url: 'https://www.ruanyifeng.com', description: '技术周刊与博客', icon: '📝' },
    { name: '酷壳', url: 'https://coolshell.cn', description: '陈皓的技术博客', icon: '🐚' },
    { name: 'V2EX', url: 'https://v2ex.com', description: '创意工作者社区', icon: '💬' },
    { name: '掘金', url: 'https://juejin.cn', description: '开发者技术社区', icon: '💎' },
    { name: '博客园', url: 'https://www.cnblogs.com', description: '开发者的网上家园', icon: '🏡' },
    { name: '少数派', url: 'https://sspai.com', description: '数字生活指南', icon: '📲' },
    { name: 'Dribbble', url: 'https://dribbble.com', description: '设计师作品展示', icon: '🏀' },
    { name: 'Behance', url: 'https://www.behance.net', description: 'Adobe 创意平台', icon: '🎭' },
    { name: '站酷', url: 'https://www.zcool.com.cn', description: '设计师社区', icon: '🎯' },
    { name: '优设', url: 'https://www.uisdc.com', description: '设计师学习平台', icon: '📐' },
    { name: '花瓣网', url: 'https://huaban.com', description: '中文灵感收集', icon: '🌺' },
    { name: 'GitHub', url: 'https://github.com', description: '全球代码托管平台', icon: '🐙' },
    { name: 'Notion', url: 'https://notion.so', description: '一体化工作空间', icon: '📋' },
    { name: 'Figma', url: 'https://figma.com', description: '协作设计工具', icon: '🖌️' },
    { name: '草料二维码', url: 'https://cli.im', description: '在线二维码生成', icon: '📱' },
    { name: 'iLovePDF', url: 'https://www.ilovepdf.com/zh-cn', description: 'PDF 在线处理', icon: '📄' },
];

function renderFriendLinks(links) {
    const grid = document.getElementById('friendsGrid');
    if (!links || links.length === 0) {
        grid.innerHTML = '<p style="color:var(--text-3);grid-column:1/-1;text-align:center;padding:var(--space-xl)">暂无友情链接</p>';
        return;
    }
    grid.innerHTML = links.map(f => {
        const rawIcon = f.icon || f.i || '🔗';
        const iconHtml = rawIcon.startsWith('http')
            ? `<img src="${rawIcon}" style="width:32px;height:32px;border-radius:6px;object-fit:cover" onerror="this.outerHTML=''">`
            : rawIcon;
        const desc = f.description || f.d || '';
        const name = f.name || f.n || '';
        const url = f.url || f.u || '#';
        return `<a href="${url}" target="_blank" rel="noopener" class="link-card rv">
            <div class="link-avatar">${iconHtml}</div>
            <div class="link-info"><div class="link-name">${name}</div><div class="link-desc">${desc}</div></div>
        </a>`;
    }).join('');
    revealEls(grid.querySelectorAll('.rv'));
}

// Load from CMS API
(async function initCMS() {
    try {
        const [linksRes, pageRes, settingsRes] = await Promise.all([
            fetch('/api/links').catch(() => null),
            fetch('/api/pages/links').catch(() => null),
            fetch('/api/settings').catch(() => null)
        ]);

        // Load friend links from CMS
        if (linksRes && linksRes.ok) {
            const links = await linksRes.json();
            if (links && links.length > 0) {
                renderFriendLinks(links);
            } else {
                renderFriendLinks(fallbackFriends);
            }
        } else {
            renderFriendLinks(fallbackFriends);
        }

        // Load page content from CMS
        if (pageRes && pageRes.ok) {
            const page = await pageRes.json();
            if (page && page.content) {
                const container = document.getElementById('linksPageContent');
                container.innerHTML = '<div class="about-card rv" style="margin-bottom:var(--space-lg)">' + page.content + '</div>';
                container.querySelectorAll('.rv').forEach(el => obs.observe(el));
                setTimeout(() => {
                    container.querySelectorAll('.rv').forEach(el => {
                        const r = el.getBoundingClientRect();
                        if (r.top < window.innerHeight && r.bottom > 0) el.classList.add('vis');
                    });
                }, 50);
            }
            if (page && page.title) {
                document.title = page.title + ' - DogNav';
            }
        }

        // Load settings for site icon
        if (settingsRes && settingsRes.ok) {
            const settings = await settingsRes.json();
            if (settings.site_icon) {
                let link = document.querySelector('link[rel="icon"]');
                if (!link) { link = document.createElement('link'); link.rel = 'icon'; document.head.appendChild(link); }
                link.href = settings.site_icon;
            }
        }
    } catch (err) {
        console.log('CMS not available, using fallback');
        renderFriendLinks(fallbackFriends);
    }
})();
</script>
</body>
</html>
